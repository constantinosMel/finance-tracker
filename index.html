<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-card: #1e2130;
    --bg-input: #252840;
    --border: #2e3250;
    --text-primary: #e8eaf6;
    --text-secondary: #8b90b8;
    --text-muted: #555a7a;
    --accent-blue: #5c6bc0;
    --accent-blue-light: #7986cb;
    --accent-green: #26a69a;
    --accent-red: #ef5350;
    --accent-yellow: #ffa726;
    --accent-purple: #ab47bc;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Layout */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text-primary);
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .header-actions { display: flex; gap: 8px; }

  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    flex: 1;
    max-width: 1600px;
    margin: 0 auto;
    width: 100%;
    padding: 2rem;
    gap: 2rem;
  }

  /* Cards */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
  }

  .card-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    margin-bottom: 1.25rem;
  }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .summary-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
  }

  .summary-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    margin-bottom: 0.5rem;
  }

  .summary-value {
    font-size: 1.6rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .summary-value.income { color: var(--accent-green); }
  .summary-value.expense { color: var(--accent-red); }
  .summary-value.balance { color: var(--text-primary); }

  .summary-balance { grid-column: 1 / -1; }

  .balance-big {
    font-size: 2.2rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }

  /* Form */
  .form-group { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 0.4rem;
  }

  input, select, textarea {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    padding: 0.6rem 0.9rem;
    font-size: 0.9rem;
    font-family: inherit;
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }

  input:focus, select:focus {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 3px rgba(92,107,192,0.15);
  }

  select option { background: var(--bg-input); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

  .type-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    background: var(--bg-input);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 1rem;
  }

  .type-btn {
    padding: 0.5rem;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    background: transparent;
    color: var(--text-secondary);
  }

  .type-btn.active-income { background: var(--accent-green); color: #fff; }
  .type-btn.active-expense { background: var(--accent-red); color: #fff; }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0.6rem 1.1rem;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    font-family: inherit;
  }

  .btn-primary {
    background: var(--accent-blue);
    color: #fff;
    width: 100%;
    padding: 0.75rem;
    font-size: 0.9rem;
  }

  .btn-primary:hover { background: var(--accent-blue-light); transform: translateY(-1px); }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .btn-ghost:hover { border-color: var(--accent-blue); color: var(--text-primary); }

  .btn-danger-ghost {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-muted);
    padding: 0.3rem 0.5rem;
    font-size: 0.8rem;
  }

  .btn-danger-ghost:hover { color: var(--accent-red); }

  /* Content area */
  .content { display: flex; flex-direction: column; gap: 1.5rem; }

  /* Charts */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .chart-wrap {
    position: relative;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Filters */
  .filters {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .filters input[type="text"] { max-width: 220px; }
  .filters select { max-width: 160px; }

  .filter-label {
    font-size: 0.78rem;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  /* Transaction list */
  .tx-list { display: flex; flex-direction: column; gap: 0; }

  .tx-item {
    display: grid;
    grid-template-columns: 36px 1fr auto auto;
    align-items: center;
    gap: 0.75rem;
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  .tx-item:last-child { border-bottom: none; }
  .tx-item:hover { background: rgba(255,255,255,0.03); }

  .tx-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .tx-info { min-width: 0; }

  .tx-desc {
    font-size: 0.9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tx-meta {
    font-size: 0.75rem;
    color: var(--text-secondary);
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .tx-cat-badge {
    background: var(--bg-input);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.7rem;
  }

  .tx-amount {
    font-size: 0.95rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: right;
    white-space: nowrap;
  }

  .tx-amount.income { color: var(--accent-green); }
  .tx-amount.expense { color: var(--accent-red); }

  .tx-actions { display: flex; align-items: center; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .page-btns { display: flex; gap: 4px; }

  .page-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.1s;
  }

  .page-btn:hover, .page-btn.active {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
  }

  .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Toast */
  #toast-container {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    z-index: 9999;
  }

  .toast {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1.1rem;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow);
    animation: slideIn 0.25s ease;
    max-width: 320px;
  }

  .toast.success { border-left: 3px solid var(--accent-green); }
  .toast.error { border-left: 3px solid var(--accent-red); }
  .toast.info { border-left: 3px solid var(--accent-blue); }

  @keyframes slideIn {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes fadeOut {
    to { transform: translateX(20px); opacity: 0; }
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    width: 90%;
    max-width: 420px;
    box-shadow: var(--shadow);
  }

  .modal-title {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 1rem;
  }

  .modal-actions {
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Responsive */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; padding: 1rem; }
    .charts-grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .summary-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .filters { flex-direction: column; align-items: stretch; }
    .filters input[type="text"], .filters select { max-width: 100%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">
      <div class="logo-icon">💰</div>
      Finance Tracker
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="exportData()">⬆ Export</button>
      <button class="btn btn-ghost" onclick="document.getElementById('import-file').click()">⬇ Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </header>

  <div class="main">
    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Summary -->
      <div>
        <div class="summary-grid">
          <div class="summary-card summary-balance" style="grid-column:1/-1">
            <div class="summary-label">Net Balance</div>
            <div class="balance-big" id="balance-val">$0.00</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Total Income</div>
            <div class="summary-value income" id="income-val">$0.00</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Total Expenses</div>
            <div class="summary-value expense" id="expense-val">$0.00</div>
          </div>
        </div>
      </div>

      <!-- Add Transaction Form -->
      <div class="card">
        <div class="card-title">Add Transaction</div>

        <div class="type-toggle">
          <button class="type-btn active-expense" id="btn-expense" onclick="setType('expense')">Expense</button>
          <button class="type-btn" id="btn-income" onclick="setType('income')">Income</button>
        </div>

        <div class="form-group">
          <label>Description</label>
          <input type="text" id="f-desc" placeholder="e.g. Grocery shopping" maxlength="80">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Amount ($)</label>
            <input type="number" id="f-amount" placeholder="0.00" min="0.01" step="0.01">
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="f-date">
          </div>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="f-category">
            <option value="food">🍔 Food</option>
            <option value="rent">🏠 Rent</option>
            <option value="transport">🚗 Transport</option>
            <option value="entertainment">🎬 Entertainment</option>
            <option value="shopping">🛍️ Shopping</option>
            <option value="salary">💼 Salary</option>
            <option value="investments">📈 Investments</option>
            <option value="other">📦 Other</option>
          </select>
        </div>

        <button class="btn btn-primary" onclick="addTransaction()">+ Add Transaction</button>
      </div>

      <!-- Monthly chart -->
      <div class="card">
        <div class="card-title">Monthly Overview</div>
        <div class="chart-wrap" style="height:200px">
          <canvas id="monthlyChart"></canvas>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <div class="content">
      <!-- Charts row -->
      <div class="charts-grid">
        <div class="card">
          <div class="card-title">Spending by Category</div>
          <div class="chart-wrap">
            <canvas id="categoryChart"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Income vs Expenses (6 Months)</div>
          <div class="chart-wrap">
            <canvas id="barChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Transactions -->
      <div class="card" style="padding:0; overflow:hidden">
        <div style="padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem;">
          <div class="card-title" style="margin:0">Transactions</div>
          <div class="filters">
            <span class="filter-label">Filter:</span>
            <input type="text" id="search" placeholder="Search..." oninput="applyFilters()" style="padding:0.45rem 0.75rem; font-size:0.82rem">
            <select id="filter-cat" onchange="applyFilters()" style="padding:0.45rem 0.75rem; font-size:0.82rem">
              <option value="">All Categories</option>
              <option value="food">Food</option>
              <option value="rent">Rent</option>
              <option value="transport">Transport</option>
              <option value="entertainment">Entertainment</option>
              <option value="shopping">Shopping</option>
              <option value="salary">Salary</option>
              <option value="investments">Investments</option>
              <option value="other">Other</option>
            </select>
            <select id="filter-type" onchange="applyFilters()" style="padding:0.45rem 0.75rem; font-size:0.82rem">
              <option value="">All Types</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <select id="filter-sort" onchange="applyFilters()" style="padding:0.45rem 0.75rem; font-size:0.82rem">
              <option value="date-desc">Newest First</option>
              <option value="date-asc">Oldest First</option>
              <option value="amount-desc">Amount ↓</option>
              <option value="amount-asc">Amount ↑</option>
            </select>
          </div>
        </div>
        <div class="tx-list" id="tx-list"></div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay hidden" id="delete-modal">
  <div class="modal">
    <div class="modal-title">Delete Transaction</div>
    <p style="color:var(--text-secondary); font-size:0.9rem">Are you sure you want to delete this transaction? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn" style="background:var(--accent-red);color:#fff" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'finance_tracker_v1';
let transactions = [];
let currentType = 'expense';
let pendingDeleteId = null;
let currentPage = 1;
const PAGE_SIZE = 12;
let filteredTx = [];

// Chart instances
let categoryChart, barChart, monthlyChart;

// ─── Categories ────────────────────────────────────────────────────────────
const CATEGORIES = {
  food:          { label: 'Food',          emoji: '🍔', color: '#FF7043' },
  rent:          { label: 'Rent',          emoji: '🏠', color: '#5C6BC0' },
  transport:     { label: 'Transport',     emoji: '🚗', color: '#26C6DA' },
  entertainment: { label: 'Entertainment', emoji: '🎬', color: '#AB47BC' },
  shopping:      { label: 'Shopping',      emoji: '🛍️', color: '#EC407A' },
  salary:        { label: 'Salary',        emoji: '💼', color: '#26A69A' },
  investments:   { label: 'Investments',   emoji: '📈', color: '#FFA726' },
  other:         { label: 'Other',         emoji: '📦', color: '#78909C' },
};

// ─── Sample Data ───────────────────────────────────────────────────────────
const SAMPLE_DATA = [
  { id: uid(), desc: 'Monthly Salary',      amount: 4500, type: 'income',  category: 'salary',        date: '2026-03-01' },
  { id: uid(), desc: 'Stock Dividends',     amount: 320,  type: 'income',  category: 'investments',   date: '2026-03-03' },
  { id: uid(), desc: 'Apartment Rent',      amount: 1200, type: 'expense', category: 'rent',          date: '2026-03-01' },
  { id: uid(), desc: 'Grocery Run',         amount: 87.5, type: 'expense', category: 'food',          date: '2026-03-04' },
  { id: uid(), desc: 'Netflix + Spotify',   amount: 28,   type: 'expense', category: 'entertainment', date: '2026-03-05' },
  { id: uid(), desc: 'Uber to Airport',     amount: 34,   type: 'expense', category: 'transport',     date: '2026-03-06' },
  { id: uid(), desc: 'New Shoes',           amount: 119,  type: 'expense', category: 'shopping',      date: '2026-03-07' },
  { id: uid(), desc: 'Lunch with Team',     amount: 42,   type: 'expense', category: 'food',          date: '2026-03-08' },
  { id: uid(), desc: 'Freelance Project',   amount: 850,  type: 'income',  category: 'salary',        date: '2026-02-28' },
  { id: uid(), desc: 'Bus Monthly Pass',    amount: 65,   type: 'expense', category: 'transport',     date: '2026-02-25' },
  { id: uid(), desc: 'Birthday Dinner',     amount: 78,   type: 'expense', category: 'food',          date: '2026-02-22' },
  { id: uid(), desc: 'ETF Purchase',        amount: 500,  type: 'expense', category: 'investments',   date: '2026-02-20' },
  { id: uid(), desc: 'Monthly Salary',      amount: 4500, type: 'income',  category: 'salary',        date: '2026-02-01' },
  { id: uid(), desc: 'Apartment Rent',      amount: 1200, type: 'expense', category: 'rent',          date: '2026-02-01' },
  { id: uid(), desc: 'Gym Membership',      amount: 45,   type: 'expense', category: 'entertainment', date: '2026-02-03' },
  { id: uid(), desc: 'Amazon Order',        amount: 93,   type: 'expense', category: 'shopping',      date: '2026-02-10' },
  { id: uid(), desc: 'Monthly Salary',      amount: 4500, type: 'income',  category: 'salary',        date: '2026-01-01' },
  { id: uid(), desc: 'Apartment Rent',      amount: 1200, type: 'expense', category: 'rent',          date: '2026-01-01' },
  { id: uid(), desc: 'New Year Dinner',     amount: 156,  type: 'expense', category: 'food',          date: '2026-01-01' },
  { id: uid(), desc: 'Phone Bill',          amount: 55,   type: 'expense', category: 'other',         date: '2026-01-05' },
  { id: uid(), desc: 'Consulting Fee',      amount: 1200, type: 'income',  category: 'salary',        date: '2025-12-28' },
  { id: uid(), desc: 'Monthly Salary',      amount: 4500, type: 'income',  category: 'salary',        date: '2025-12-01' },
  { id: uid(), desc: 'Apartment Rent',      amount: 1200, type: 'expense', category: 'rent',          date: '2025-12-01' },
  { id: uid(), desc: 'Christmas Gifts',     amount: 340,  type: 'expense', category: 'shopping',      date: '2025-12-20' },
];

// ─── Utilities ─────────────────────────────────────────────────────────────
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function fmt(n) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n);
}

function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => {
    el.style.animation = 'fadeOut 0.3s ease forwards';
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

// ─── Storage ───────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      transactions = JSON.parse(raw);
    } else {
      transactions = [...SAMPLE_DATA];
      save();
    }
  } catch {
    transactions = [...SAMPLE_DATA];
  }
}

// ─── Type toggle ───────────────────────────────────────────────────────────
function setType(t) {
  currentType = t;
  const btnE = document.getElementById('btn-expense');
  const btnI = document.getElementById('btn-income');
  btnE.className = 'type-btn' + (t === 'expense' ? ' active-expense' : '');
  btnI.className = 'type-btn' + (t === 'income' ? ' active-income' : '');

  // Update category defaults
  const cat = document.getElementById('f-category');
  if (t === 'income') {
    cat.value = cat.value === 'salary' || cat.value === 'investments' ? cat.value : 'salary';
  } else {
    cat.value = cat.value === 'salary' ? 'food' : cat.value;
  }
}

// ─── Add transaction ───────────────────────────────────────────────────────
function addTransaction() {
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value;
  const category = document.getElementById('f-category').value;

  if (!desc) return toast('Please enter a description.', 'error');
  if (!amount || amount <= 0) return toast('Please enter a valid amount.', 'error');
  if (!date) return toast('Please select a date.', 'error');

  const tx = { id: uid(), desc, amount, type: currentType, category, date };
  transactions.unshift(tx);
  save();
  render();

  // Reset form
  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

  toast(`Transaction added successfully!`, 'success');
}

// ─── Delete ────────────────────────────────────────────────────────────────
function deleteTransaction(id) {
  pendingDeleteId = id;
  document.getElementById('delete-modal').classList.remove('hidden');
}

function closeDeleteModal() {
  pendingDeleteId = null;
  document.getElementById('delete-modal').classList.add('hidden');
}

function confirmDelete() {
  transactions = transactions.filter(t => t.id !== pendingDeleteId);
  save();
  render();
  closeDeleteModal();
  toast('Transaction deleted.', 'info');
}

// Close modal on overlay click
document.getElementById('delete-modal').addEventListener('click', function(e) {
  if (e.target === this) closeDeleteModal();
});

// ─── Filters & pagination ──────────────────────────────────────────────────
function applyFilters() {
  currentPage = 1;
  renderList();
}

function getFiltered() {
  const search = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  const type = document.getElementById('filter-type').value;
  const sort = document.getElementById('filter-sort').value;

  let list = transactions.filter(t => {
    if (search && !t.desc.toLowerCase().includes(search) && !t.category.includes(search)) return false;
    if (cat && t.category !== cat) return false;
    if (type && t.type !== type) return false;
    return true;
  });

  list.sort((a, b) => {
    if (sort === 'date-desc') return b.date.localeCompare(a.date);
    if (sort === 'date-asc') return a.date.localeCompare(b.date);
    if (sort === 'amount-desc') return b.amount - a.amount;
    if (sort === 'amount-asc') return a.amount - b.amount;
    return 0;
  });

  return list;
}

// ─── Render list ───────────────────────────────────────────────────────────
function renderList() {
  filteredTx = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filteredTx.length / PAGE_SIZE));
  currentPage = Math.min(currentPage, totalPages);

  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filteredTx.slice(start, start + PAGE_SIZE);

  const list = document.getElementById('tx-list');

  if (page.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>No transactions found.</div>`;
  } else {
    list.innerHTML = page.map(t => {
      const cat = CATEGORIES[t.category] || CATEGORIES.other;
      const sign = t.type === 'income' ? '+' : '-';
      const bgOpacity = t.type === 'income' ? 'rgba(38,166,154,0.15)' : 'rgba(239,83,80,0.12)';
      return `
        <div class="tx-item">
          <div class="tx-icon" style="background:${bgOpacity}">${cat.emoji}</div>
          <div class="tx-info">
            <div class="tx-desc">${escHtml(t.desc)}</div>
            <div class="tx-meta">
              <span>${fmtDate(t.date)}</span>
              <span class="tx-cat-badge">${cat.label}</span>
            </div>
          </div>
          <div class="tx-amount ${t.type}">${sign}${fmt(t.amount)}</div>
          <div class="tx-actions">
            <button class="btn btn-danger-ghost" onclick="deleteTransaction('${t.id}')" title="Delete">✕</button>
          </div>
        </div>`;
    }).join('');
  }

  renderPagination(totalPages);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1 && filteredTx.length === 0) { pg.innerHTML = ''; return; }

  const shown = Math.min(currentPage * PAGE_SIZE, filteredTx.length);
  const start = filteredTx.length === 0 ? 0 : (currentPage - 1) * PAGE_SIZE + 1;

  let btns = '';
  for (let i = 1; i <= totalPages; i++) {
    if (totalPages > 7 && i > 2 && i < totalPages - 1 && Math.abs(i - currentPage) > 1) {
      if (i === 3 || i === totalPages - 2) btns += `<span style="color:var(--text-muted);padding:0 4px">…</span>`;
      continue;
    }
    btns += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }

  pg.innerHTML = `
    <span>${start}–${shown} of ${filteredTx.length}</span>
    <div class="page-btns">
      <button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>
      ${btns}
      <button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>›</button>
    </div>`;
}

function goPage(p) {
  const total = Math.max(1, Math.ceil(filteredTx.length / PAGE_SIZE));
  currentPage = Math.max(1, Math.min(p, total));
  renderList();
}

// ─── Summary ───────────────────────────────────────────────────────────────
function renderSummary() {
  const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const balance = income - expense;

  document.getElementById('income-val').textContent = fmt(income);
  document.getElementById('expense-val').textContent = fmt(expense);
  const bEl = document.getElementById('balance-val');
  bEl.textContent = fmt(balance);
  bEl.style.color = balance >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
}

// ─── Charts ────────────────────────────────────────────────────────────────
Chart.defaults.color = '#8b90b8';
Chart.defaults.borderColor = '#2e3250';
Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";

function getCategoryData() {
  const sums = {};
  transactions.filter(t => t.type === 'expense').forEach(t => {
    sums[t.category] = (sums[t.category] || 0) + t.amount;
  });
  const entries = Object.entries(sums).sort((a, b) => b[1] - a[1]);
  return {
    labels: entries.map(([k]) => `${CATEGORIES[k]?.emoji} ${CATEGORIES[k]?.label || k}`),
    data: entries.map(([, v]) => v),
    colors: entries.map(([k]) => CATEGORIES[k]?.color || '#78909C'),
  };
}

function getMonthlyData(months = 6) {
  const result = [];
  const now = new Date('2026-03-10');
  for (let i = months - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const label = d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
    const monthTx = transactions.filter(t => t.date.startsWith(key));
    const income = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    result.push({ label, income, expense });
  }
  return result;
}

function renderCharts() {
  const catData = getCategoryData();
  const monthData = getMonthlyData(6);
  const monthData3 = getMonthlyData(6);

  // Category donut
  if (categoryChart) categoryChart.destroy();
  categoryChart = new Chart(document.getElementById('categoryChart'), {
    type: 'doughnut',
    data: {
      labels: catData.labels,
      datasets: [{ data: catData.data, backgroundColor: catData.colors, borderWidth: 0, hoverOffset: 6 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '68%',
      plugins: {
        legend: { position: 'right', labels: { boxWidth: 10, padding: 14, font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.parsed)}` } }
      }
    }
  });

  // Bar chart
  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: {
      labels: monthData.map(m => m.label),
      datasets: [
        {
          label: 'Income',
          data: monthData.map(m => m.income),
          backgroundColor: 'rgba(38,166,154,0.75)',
          borderRadius: 5, borderSkipped: false,
        },
        {
          label: 'Expenses',
          data: monthData.map(m => m.expense),
          backgroundColor: 'rgba(239,83,80,0.7)',
          borderRadius: 5, borderSkipped: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { boxWidth: 10, font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.parsed.y)}` } }
      },
      scales: {
        x: { grid: { display: false } },
        y: { ticks: { callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(1)+'k' : v) } }
      }
    }
  });

  // Monthly line chart (sidebar)
  if (monthlyChart) monthlyChart.destroy();
  const netData = monthData3.map(m => m.income - m.expense);
  monthlyChart = new Chart(document.getElementById('monthlyChart'), {
    type: 'line',
    data: {
      labels: monthData3.map(m => m.label),
      datasets: [{
        label: 'Net',
        data: netData,
        borderColor: '#5c6bc0',
        backgroundColor: 'rgba(92,107,192,0.1)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: netData.map(v => v >= 0 ? '#26a69a' : '#ef5350'),
        pointRadius: 4,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${fmt(ctx.parsed.y)}` } }
      },
      scales: {
        x: { grid: { display: false } },
        y: { ticks: { callback: v => '$' + (v >= 1000 ? (v/1000).toFixed(1)+'k' : v) } }
      }
    }
  });
}

// ─── Export / Import ───────────────────────────────────────────────────────
function exportData() {
  const data = {
    version: 1,
    exported: new Date().toISOString(),
    transactions,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `finance-tracker-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Data exported successfully!', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      const imported = data.transactions || data;
      if (!Array.isArray(imported)) throw new Error('Invalid format');
      const valid = imported.filter(t => t.id && t.desc && t.amount && t.type && t.date);
      transactions = valid;
      save();
      render();
      toast(`Imported ${valid.length} transactions.`, 'success');
    } catch {
      toast('Failed to import: invalid file format.', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Main render ───────────────────────────────────────────────────────────
function render() {
  renderSummary();
  renderList();
  renderCharts();
}

// ─── Init ──────────────────────────────────────────────────────────────────
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
load();
render();
</script>
